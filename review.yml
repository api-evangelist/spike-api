aid: spike-api
name: Spike
review:
  question: Does Spike expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Spike's own public real-time surface is
    outbound HTTP webhooks, not a client-connectable server-push transport.
    Spike POSTs a JSON array of events (record_change,
    provider_integration_created, provider_integration_deleted) to a webhook URL
    the developer configures in the admin console, HMAC-SHA256 signed via the
    X-Body-Signature header, with retries. There is no wss:// or SSE endpoint on
    Spike's API for a client to subscribe to, so there is no bidirectional /
    server-push channel to model in AsyncAPI. The webhook contract is documented
    prose plus a signed HTTP POST, already captured in the Webhooks API entry and
    the rate-limits file.
findings:
  summary: |
    Spike does not publish a documented public WebSocket API. Spike (Spike
    Technologies) is a unified health and wearables data aggregator. Its public
    developer surface is a REST API at https://app-api.spikeapi.com/v3
    (confirmed from Spike's own OpenAPI, version 3.0.2, served at
    https://docs.spikeapi.com/api-reference/openapi.json). Applications
    authenticate end users with HMAC-SHA256 signatures to mint a JWT
    (POST /auth/hmac, /auth/client_token, /auth/pkcs1), connect providers via
    hosted OAuth-style integration flows (/providers/{provider_slug}/integration/init),
    then query normalized data (sleep, workouts, provider records, time series,
    statistics), analyze nutrition and lab reports, and read user info - all
    request/response REST over HTTPS with a Bearer JWT. Real-time delivery is
    handled by outbound webhooks only. No WebSocket (ws:// or wss://) or
    Server-Sent Events endpoint is documented anywhere in Spike's API reference,
    webhooks guide, or OpenAPI as of the review date.
  openSource: |
    Spike's platform is a proprietary, hosted SaaS. A GitHub organization exists
    (github.com/Spike-API) but publishes no open-source server or spec; Spike
    ships closed-source mobile SDKs (iOS, Android, Flutter, React Native). The
    API contract is published as an OpenAPI 3.1 document at
    docs.spikeapi.com/api-reference/openapi.json.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://app-api.spikeapi.com/v3
      documented: true
      note: Application User API - auth, provider integrations, queries, nutrition, lab reports, users, SDK push. Bearer JWT.
    - protocol: Webhook
      scheme: https
      documented: true
      note: >-
        Outbound event delivery to a developer-configured URL. HMAC-SHA256
        signed (X-Body-Signature). Events - record_change,
        provider_integration_created, provider_integration_deleted. Server-to-
        endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Spike's API reference or OpenAPI as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events endpoint is documented.
