  endpointsModeled:
    - >-
      Per-provider OAuth callback paths are confirmed to exist in the OpenAPI for
      garmin, fitbit, oura, whoop, dexcom, dexcom_sandbox, freestyle_libre,
      withings, polar, suunto, strava, coros, wahoo, ultrahuman, omron_us,
      omron_eu, huawei, google_fit, google_health, biostrap, luna,
      map_my_fitness, and testing. The OpenAPI in this repo models a single
      parameterized /providers/{provider_slug}/integration/callback rather than
      restating all ~20 confirmed callback paths.
    - >-
      Request bodies and response payloads are modeled as generic JSON objects.
      Spike's published OpenAPI defines detailed component schemas (ProviderRecord,
      Sleep, Workout, time series samples, nutrition fields, etc.); those were not
      transcribed field-by-field into this repo's OpenAPI and are represented as
      open objects.
    - >-
      Metric identifiers used in time series / statistics queries (heartrate,
      heartrate_resting, hrv_rmssd, hrv_sdnn, glucose, weight, body_fat, spo2,
      breathing_rate, steps, distance, calories_burned, sleep_duration,
      sleep_efficiency) are confirmed from the metrics matrix. Heart-rate,
      body/weight, and glucose/CGM data are delivered through the time series,
      statistics, and provider-records query surfaces rather than dedicated
      per-domain endpoints.
    - >-
      Stress and mindfulness/meditation: Spike markets a Health Insights "Stress
      Score" (0-100) derived primarily from HRV, but no distinct stress or
      mindfulness metric identifier or endpoint is documented in the public
      metrics matrix. Treated as a derived insight, not a confirmed standalone
      API surface.
sources:
  - url: https://docs.spikeapi.com/api-reference/openapi.json
    type: OpenAPI
    note: Spike's published OpenAPI 3.1 (info version 3.0.2). Server https://app-api.spikeapi.com/v3. 61 paths, bearer JWT security.
  - url: https://docs.spikeapi.com/api-docs/authentication
    type: Documentation
    note: HMAC-SHA256 signature exchanged at /auth/hmac for a JWT; Authorization Bearer header.
  - url: https://docs.spikeapi.com/api-docs/webhooks
    type: Documentation
    note: Outbound webhook events, X-Body-Signature HMAC-SHA256, up to 10 retries. No WebSocket/SSE.
  - url: https://docs.spikeapi.com/technical-references/metrics_matrix
    type: Documentation
    note: Metric identifiers for time series and statistics queries.
  - url: https://docs.spikeapi.com/technical-references/provider_matrix
    type: Documentation
    note: Supported providers connectable via the integration flows.
  - url: https://www.spikeapi.com/pricing
    type: Documentation
    note: Sandbox from $450/month per product line; Enterprise custom. No free tier.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists on Spike's API. Spike's own
    public API is request/response REST (Application User API) plus outbound,
    developer-configured HMAC-signed webhooks. No AsyncAPI document was created
    because there is no client-connectable server-push transport to model; the
    webhook contract is captured as the Webhooks API entry in apis.yml and in the
    rate-limits file.
