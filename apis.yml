  - url: https://docs.spikeapi.com/api-docs/overview
    type: Documentation
  - url: openapi/spike-api-openapi.yml
    type: OpenAPI
  - url: collections/spike-api.postman_collection.json
    type: PostmanCollection
  - url: collections/spike-api.opencollection.json
    type: OpenCollection
  description: Ingest on-device health data pushed from the Spike mobile SDKs. The
    SDK posts Apple Health, Android Health Connect, and Samsung Health samples
    (JSON and protobuf) via /providers/apple/push,
    /providers/health_connect/push, and /providers/samsung_health_data/push/proto
    for normalization into the same query surface.
- aid: spike-api:spike-api-webhooks-api
  name: Spike Webhooks API
  tags:
  - Webhooks
  - Events
  - Notifications
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.spikeapi.com/api-docs/webhooks
  baseURL: https://app-api.spikeapi.com/v3
  properties:
  - url: https://docs.spikeapi.com/api-docs/webhooks
    type: Documentation
  description: Outbound webhook event delivery. After data updates, Spike POSTs a
    JSON array of events - record_change, provider_integration_created, and
    provider_integration_deleted - to a webhook URL configured in the admin
    console, HMAC-SHA256 signed via the X-Body-Signature header, with retries
    (up to 10) on non-200 responses. Delivery is outbound HTTP only; there is no
    public WebSocket or SSE surface.
