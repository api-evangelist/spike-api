  - url: collections/spike-api.postman_collection.json
    type: PostmanCollection
  - url: collections/spike-api.opencollection.json
    type: OpenCollection
  description: Connect and disconnect a user's data providers. Initialize a hosted
    integration flow (/providers/{provider_slug}/integration/init and /init_url),
    receive the provider OAuth callback, and delete an existing integration.
    Providers include Garmin, Fitbit, Oura, Whoop, Dexcom, FreeStyle Libre,
    Withings, Polar, Suunto, Strava, Coros, Wahoo, Ultrahuman, Omron, Huawei,
    Google Fit, Google Health Connect, and more.
