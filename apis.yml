    type: OpenAPI
  - url: collections/spike-api.postman_collection.json
    type: PostmanCollection
  - url: collections/spike-api.opencollection.json
    type: OpenCollection
  description: Create, analyze, and manage nutrition records. Analyze a food image
    (/nutrition_records/image), a nutrition-facts label
    (/nutrition_records/ingredients/label), or a free-text meal
    (/nutrition_records/text), log a manual record (/nutrition_records/manual),
    then list, get, modify, replace, or delete records across 29 nutritional
    fields.
