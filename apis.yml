- aid: spike-api:spike-api-time-series-api
  name: Spike Time Series API
  tags:
  - Time Series
  - Heart Rate
  - Glucose
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.spikeapi.com/api-reference/query-timeseries
  baseURL: https://app-api.spikeapi.com/v3
  properties:
  - url: https://docs.spikeapi.com/api-reference/query-timeseries
    type: APIReference
  - url: https://docs.spikeapi.com/technical-references/metrics_matrix
    type: Documentation
  - url: openapi/spike-api-openapi.yml
    type: OpenAPI
  - url: collections/spike-api.postman_collection.json
    type: PostmanCollection
  - url: collections/spike-api.opencollection.json
    type: OpenCollection
  description: Retrieve high-resolution time series for a specified metric via
    /queries/timeseries, /queries/timeseries/samples, and
    /queries/timeseries/split (split by provider source). Metrics include heart
    rate, resting heart rate, HRV (RMSSD and SDNN), glucose, weight, body fat,
    SpO2, breathing rate, steps, distance, and calories burned - the surface
    through which heart-rate, body/weight, and CGM/glucose data are delivered.
