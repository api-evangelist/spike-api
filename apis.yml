aid: spike-api
url: https://raw.githubusercontent.com/api-evangelist/spike-api/refs/heads/main/apis.yml
name: Spike
kind: company
description: Spike (Spike Technologies) provides a unified health and wearables data
  API that connects an application to 500+ wearables, IoT devices, CGMs, EMRs, labs,
  and nutrition sources through a single integration - aggregating Apple Health,
  Garmin, Fitbit, Oura, Whoop, Dexcom, Withings, Polar, Suunto, Strava, and more.
  Developers authenticate end users with HMAC signatures, connect providers via
  hosted OAuth-style integration flows, then query normalized health data - sleep,
  workouts, time series metrics (heart rate, HRV, glucose, weight, SpO2, steps),
  daily and interval statistics, nutrition, and lab reports - over a REST API at
  https://app-api.spikeapi.com/v3, with outbound webhooks pushing record-change
  events. Spike also ships mobile SDKs (iOS, Android, Flutter, React Native), a
  Nutrition AI scanner, and an MCP layer for AI-ready health data.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Health Data
- Wearables
- Fitness
- Digital Health
- Data Aggregation
- HIPAA
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
