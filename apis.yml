- aid: spike-api:spike-api-authentication-api
  name: Spike Authentication API
  tags:
  - Authentication
  - HMAC
  - Tokens
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.spikeapi.com/api-docs/authentication
  baseURL: https://app-api.spikeapi.com/v3
  properties:
  - url: https://docs.spikeapi.com/api-docs/authentication
    type: Documentation
  - url: https://docs.spikeapi.com/api-reference/openapi.json
    type: APIReference
  - url: openapi/spike-api-openapi.yml
    type: OpenAPI
  - url: collections/spike-api.postman_collection.json
    type: PostmanCollection
  - url: collections/spike-api.opencollection.json
    type: OpenCollection
  description: Authenticate an application's end users and mint a JWT access token.
    The application signs the application user ID with its secret using HMAC-SHA256
    and exchanges the signature at /auth/hmac (also /auth/client_token and
    /auth/pkcs1); the returned Bearer token authorizes all subsequent requests.
- aid: spike-api:spike-api-provider-integrations-api
  name: Spike Provider Integrations API
  tags:
  - Connections
  - Providers
  - OAuth
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.spikeapi.com/api-docs/provider_integration
  baseURL: https://app-api.spikeapi.com/v3
  properties:
